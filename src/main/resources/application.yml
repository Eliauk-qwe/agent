# Spring 应用配置
spring:
  application:
    name: ai_agent_plus  # 应用名称
  ai:
    dashscope:
      api-key: sk-b038c963102742cfa5934a91d8351045
      chat:
        options:
          model: qwen-plus

# 服务器配置
#http://localhost:9000/api/doc.html
server:
  port: 9000  # 服务端口
  servlet:
    context-path: /api  # 接口统一前缀






# knife4j
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.wly.ai_agent_plus.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

